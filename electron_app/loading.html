<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starting EyeYantra Workstation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #EEF1F9;
      --primary: #1B2A6B;
      --teal: #14B8AA;
      --text: #1A1F36;
      --muted: #6B7280;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 12% 8%, #E9F6F4 0%, var(--bg) 38%, #E7E9F5 100%);
      color: var(--text);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .splash-card {
      background: rgba(255, 255, 255, 0.66);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(27, 42, 107, 0.10);
      border-radius: 24px;
      padding: 48px;
      width: 480px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(11, 16, 35, 0.08);
    }
    .logo-container {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary) 0%, #123A5E 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px auto;
      box-shadow: 0 8px 16px rgba(27, 42, 107, 0.2);
    }
    .logo-container svg {
      width: 32px;
      height: 32px;
      fill: none;
      stroke: white;
      stroke-width: 2;
    }
    h1 {
      font-family: 'Sora', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
    }
    .loader {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(20, 184, 170, 0.1);
      border-radius: 50%;
      border-top-color: var(--teal);
      animation: spin 1s ease-in-out infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="splash-card">
    <div class="logo-container">
      <svg viewBox="0 0 24 24">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="12" cy="12" r="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>EyeYantra</h1>
    <p>Starting Backend Diagnostic Server...</p>
    <div class="loader"></div>
  </div>
</body>
</html>
